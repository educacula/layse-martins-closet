<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Layse Martins Closet</title>

<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB17j6xYMVnX20OW2Cgb5ibO5I52g4zA4E",
  authDomain: "casa-financeira-ae08e.firebaseapp.com",
  projectId: "casa-financeira-ae08e",
  storageBucket: "casa-financeira-ae08e.appspot.com",
  messagingSenderId: "586081436813",
  appId: "1:586081436813:web:df04229f1287dd2806cec4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const input = document.getElementById("nome");
const btn = document.querySelector("button");
const lista = document.getElementById("lista");

btn.addEventListener("click", async () => {
  const nome = input.value.trim();
  if (!nome) return;

  btn.innerText = "Salvando...";
  btn.disabled = true;

  await addDoc(collection(db, "produtos"), {
    nome: nome,
    criado: new Date()
  });

  input.value = "";
  btn.innerText = "Adicionar";
  btn.disabled = false;

  carregar();
});

async function carregar() {
  lista.innerHTML = "";
  const querySnapshot = await getDocs(collection(db, "produtos"));
  querySnapshot.forEach(doc => {
    const li = document.createElement("div");
    li.className = "p-2 border";
    li.innerText = doc.data().nome;
    lista.appendChild(li);
  });
}

carregar();
</script>

</head>
<body class="p-4">

<h1 class="text-xl font-bold mb-4">Controle de Produtos</h1>

<input id="nome" class="border p-2 mb-2 w-full" placeholder="Nome do produto"/>

<button onclick="adicionarProduto()" class="bg-black text-white p-2 w-full mb-4">
Adicionar
</button>

<div id="lista"></div>

</body>
</html>
