<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Layse Martins Closet</title>

<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB17j6xYMVnX20OW2Cgb5ibO5I52g4zA4E",
  authDomain: "casa-financeira-ae08e.firebaseapp.com",
  projectId: "casa-financeira-ae08e",
  storageBucket: "casa-financeira-ae08e.firebasestorage.app",
  messagingSenderId: "586081436813",
  appId: "1:586081436813:web:df04229f1287dd2806cec4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let produtos = [];

async function salvarNuvem(){
  await setDoc(doc(db,"loja","dados"),{produtos});
}

async function carregarNuvem(){
  const snap = await getDoc(doc(db,"loja","dados"));
  if(snap.exists()){
    produtos = snap.data().produtos || [];
    render();
  }
}

function adicionarProduto(){
  const nome = document.getElementById("nome").value;
  produtos.push({nome});
  salvarNuvem();
  render();
}

function render(){
  const lista = document.getElementById("lista");
  lista.innerHTML = produtos.map(p=>`<div class="p-2 border">${p.nome}</div>`).join("");
}

window.onload = carregarNuvem;
</script>

</head>
<body class="p-4">

<h1 class="text-xl font-bold mb-4">Controle de Produtos</h1>

<input id="nome" class="border p-2 mb-2 w-full" placeholder="Nome do produto"/>

<button onclick="adicionarProduto()" class="bg-black text-white p-2 w-full mb-4">
Adicionar
</button>

<div id="lista"></div>

</body>
</html>
