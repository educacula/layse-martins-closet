<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Layse Martins Closet V5 PRO</title>
<style>
body{font-family:Arial;background:#111;color:white;padding:20px}
.card{background:#1b1b1b;padding:20px;border-radius:12px;margin-bottom:20px}
input,select{padding:10px;width:100%;margin:6px 0;border-radius:8px;border:none}
button{padding:12px;border:none;border-radius:8px;background:#cfad62;color:black;font-weight:bold;width:100%}
</style>
</head>
<body>

<h2>Layse Martins Closet V5 PRO</h2>

<div class="card">
<h3>Registrar venda</h3>

<label>Preço do produto</label>
<input id="preco" type="number">

<label>Custo</label>
<input id="custo" type="number">

<label>Desconto (R$)</label>
<input id="desconto">

<label>Forma de pagamento</label>
<select id="pagamento">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão Ton</option>
<option>Cartão Moderninha</option>
</select>

<label>Parcelas</label>
<select id="parcelas">
<option value="1">1x</option>
<option value="2">2x</option>
<option value="3">3x</option>
<option value="6">6x</option>
<option value="12">12x</option>
</select>

<button onclick="calcular()">Calcular venda</button>

<h3 id="resultado"></h3>

</div>

<div class="card">
<h3>Calculadora de preço</h3>

<label>Custo do produto</label>
<input id="calc_custo">

<label>Margem desejada (%)</label>
<input id="calc_margem">

<button onclick="calcPreco()">Calcular preço ideal</button>

<h3 id="calc_res"></h3>

</div>

<script>

const taxas={
"Cartão Ton":{1:3.19,2:4.59,3:4.99,6:5.59,12:9.79},
"Cartão Moderninha":{1:3.99,2:5.59,3:5.99,6:7.99,12:13.99}
}

function calcular(){

let preco=parseFloat(document.getElementById("preco").value||0)
let custo=parseFloat(document.getElementById("custo").value||0)
let desconto=parseFloat(document.getElementById("desconto").value||0)

let pagamento=document.getElementById("pagamento").value
let parcelas=parseInt(document.getElementById("parcelas").value)

let valor=preco-desconto

let taxa=0

if(taxas[pagamento]){
taxa=taxas[pagamento][parcelas]||0
}

let valorTaxa=valor*(taxa/100)
let recebido=valor-valorTaxa

let lucro=recebido-custo

document.getElementById("resultado").innerHTML=
"Total cliente: R$ "+valor.toFixed(2)+"<br>"+
"Taxa máquina: R$ "+valorTaxa.toFixed(2)+"<br>"+
"Recebido: R$ "+recebido.toFixed(2)+"<br>"+
"Lucro real: R$ "+lucro.toFixed(2)

}

function calcPreco(){

let custo=parseFloat(document.getElementById("calc_custo").value||0)
let margem=parseFloat(document.getElementById("calc_margem").value||0)

let preco=custo*(1+margem/100)

document.getElementById("calc_res").innerHTML="Preço ideal: R$ "+preco.toFixed(2)

}

</script>

</body>
</html>
